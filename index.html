<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N3 Dashboard — Ampfy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--surface:#141414;--surface2:#1E1E1E;--border:#2A2A2A;
  --text:#FFF;--muted:#666;--secondary:#AAA;
  --green:#00E676;--yellow:#FFD600;--red:#FF3D3D;--orange:#FF5C00;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-size:18px;font-weight:900;letter-spacing:-.5px}.logo span{color:var(--orange)}
.dv{width:1px;height:20px;background:var(--border)}
.header-title{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.hactions{display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:#e05200}
.btn-ghost{background:transparent;color:var(--secondary);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.nav-tabs{display:flex;align-items:center;gap:2px;padding:0 32px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:transparent;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif}
.nav-tab:hover{color:var(--secondary)}.nav-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}
.sub-tabs{display:flex;gap:8px;padding:16px 32px 0}
.sub-tab{padding:6px 14px;font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.sub-tab:hover{border-color:var(--orange);color:var(--orange)}.sub-tab.active{background:rgba(255,92,0,.12);border-color:var(--orange);color:var(--orange)}
.main{padding:28px 32px}.page{display:none}.page.active{display:block}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;cursor:pointer;transition:all .2s}
.ov-card:hover{border-color:#3A3A3A;transform:translateY(-1px)}
.ov-top{display:grid;grid-template-columns:1fr auto;gap:16px;margin-bottom:20px;align-items:start}
.ov-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.ov-pct{font-size:36px;font-weight:900;letter-spacing:-2px;line-height:1}
.ov-pct-lbl{font-size:12px;font-weight:400;color:var(--muted);margin-left:4px}
.ov-hours{font-size:12px;color:var(--muted);margin-top:4px}
.kpi-badge{display:inline-block;padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:8px}
.badge-green{background:rgba(0,230,118,.12);color:var(--green)}.badge-yellow{background:rgba(255,214,0,.12);color:var(--yellow)}.badge-red{background:rgba(255,61,61,.12);color:var(--red)}
.ov-fee-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:right;min-width:170px}
.ov-fee-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.ov-fee-value{font-size:16px;font-weight:800;letter-spacing:-.5px;color:var(--orange)}
.ov-fee-sub{font-size:9px;color:var(--muted);margin-top:3px}
.ov-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.ov-chart-title{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.ov-bars{display:flex;align-items:flex-end;gap:6px;height:72px}
.ov-bar-group{display:flex;flex-direction:column;align-items:center;flex:1}
.ov-bar-cols{display:flex;gap:2px;align-items:flex-end;height:56px;width:100%;justify-content:center}
.ov-bar-col{display:flex;flex-direction:column;justify-content:flex-end;flex:1;max-width:16px}
.ov-bar{width:100%;border-radius:2px 2px 0 0;position:relative;transition:height .5s cubic-bezier(.34,1.56,.64,1)}
.ov-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#2A2A2A;color:#fff;padding:3px 7px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:20;pointer-events:none}
.ov-bar-label{font-size:8px;color:var(--muted);margin-top:4px;text-align:center;text-transform:uppercase;letter-spacing:.3px}
.ov-legend{display:flex;gap:12px;margin-top:10px}
.ov-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.ov-leg-dot{width:6px;height:6px;border-radius:1px}

/* DETAIL */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.kpi-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.kpi-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi-value{font-size:20px;font-weight:800;letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}

/* BUDGET CAMPANHA TABLE */
.camp-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px}
.camp-table-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.camp-table{width:100%;border-collapse:collapse}
.camp-table th{text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.camp-table th:not(:first-child){text-align:right}
.camp-table td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.camp-table td:not(:first-child){text-align:right}
.camp-table tr:last-child td{border-bottom:none;font-weight:700;background:rgba(255,92,0,.06);color:var(--orange)}
.camp-table tr:hover td{background:rgba(255,255,255,.02)}
.camp-name{font-weight:500}
.edit-input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:4px 8px;width:100px;text-align:right;transition:border-color .15s}
.edit-input:focus{outline:none;border-color:var(--orange)}

/* HORAS TABLE */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.chart-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:150px}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1}
.bar-wrap{display:flex;gap:3px;align-items:flex-end;height:120px;width:100%;justify-content:center}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:3px 3px 0 0;position:relative;cursor:default;min-width:10px;max-width:26px;transition:height .6s cubic-bezier(.34,1.56,.64,1)}
.bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#2A2A2A;color:#fff;padding:3px 8px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:20;pointer-events:none}
.bar-label{font-size:8px;color:var(--muted);text-align:center;margin-top:5px;line-height:1.3;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.bar-pct{font-size:8px;font-weight:700;margin-top:2px}
.bar-scope{background:var(--border)}
.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:2px}

/* HORAS EDIT */
.edit-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px}
.edit-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--secondary)}
.sec-hint{font-size:10px;color:var(--muted)}
.edit-table{width:100%;border-collapse:collapse}
.edit-table th{text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:9px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.edit-table td{padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px}
.edit-table tr:last-child td{border-bottom:none}.edit-table tr:hover td{background:rgba(255,255,255,.02)}
.h-input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:4px 8px;width:80px;text-align:right;transition:border-color .15s}
.h-input:focus{outline:none;border-color:var(--orange)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}

.import-area{border:1px dashed var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:20px;cursor:pointer;transition:border-color .2s}
.import-area:hover{border-color:var(--orange)}
.import-text{font-size:12px;color:var(--muted)}.import-text strong{color:var(--orange)}
.import-hint{font-size:10px;color:var(--muted);margin-top:3px}
#csvInput{display:none}
.acct-heading{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.acct-bar{width:4px;height:30px;border-radius:2px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-size:12px;display:none;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.ov-grid,.kpi-row,.kpi-row-4,.charts-row{grid-template-columns:1fr}.main{padding:18px 16px}.header,.nav-tabs{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">amp<span>fy</span></div>
    <div class="dv"></div>
    <div class="header-title">N3 · Dashboard Operacional</div>
  </div>
  <div class="hactions">
    <button class="btn btn-primary" onclick="saveAll()">✓ Salvar</button>
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('overview',this)">N3 Geral</button>
  <button class="nav-tab" onclick="showPage('risque',this)">Risqué</button>
  <button class="nav-tab" onclick="showPage('bozzano',this)">Bozzano</button>
  <button class="nav-tab" onclick="showPage('oetker',this)">Dr. Oetker</button>
  <button class="nav-tab" onclick="showPage('suhai',this)">Suhai</button>
  <button class="nav-tab" onclick="showPage('taskrow',this)">⚡ Taskrow</button>
</nav>

<main class="main">
  <div id="page-overview" class="page active"><div class="ov-grid" id="ov-grid"></div></div>

  <div id="page-risque" class="page">
    <div class="sub-tabs" id="risque-subtabs">
      <button class="sub-tab active" onclick="showSub('risque','base',this)">Base</button>
      <button class="sub-tab" onclick="showSub('risque','belga',this)">FY27 — Belga + D'Gel (Extra FEE)</button>
    </div>
    <div style="height:20px"></div>
    <div id="risque-content"></div>
  </div>

  <div id="page-bozzano" class="page">
    <div class="sub-tabs" id="bozzano-subtabs">
      <button class="sub-tab active" onclick="showSub('bozzano','base',this)">Base</button>
      <button class="sub-tab" onclick="showSub('bozzano','expert',this)">Expert Gel (Extra FEE)</button>
    </div>
    <div style="height:20px"></div>
    <div id="bozzano-content"></div>
  </div>

  <div id="page-oetker" class="page"><div id="oetker-content"></div></div>
  <div id="page-suhai" class="page"><div id="suhai-content"></div></div>

  <!-- ══ TASKROW ══ -->
  <div id="page-taskrow" class="page">
    <div id="taskrow-content"></div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>

const LABELS={risque:'Risqué',bozzano:'Bozzano',oetker:'Dr. Oetker',suhai:'Suhai'};
const COLORS={risque:'#E91E8C',bozzano:'#2196F3',oetker:'#FF9800',suhai:'#9C27B0'};
const SUBS={risque:['base','belga'],bozzano:['base','expert'],oetker:['base'],suhai:['base']};

// helpers
const pct=(v,t)=>t>0?Math.min(Math.round((v/t)*100),100):0;
const sCol=p=>p>=90?'var(--red)':p>=70?'var(--yellow)':'var(--green)';
const sCls=p=>p>=90?'badge-red':p>=70?'badge-yellow':'badge-green';
const sLbl=p=>p>=90?'⚠ Crítico':p>=70?'◉ Atenção':'✓ Saudável';
const fmtR=v=>v===0?'R$\u00A0—':'R$\u00A0'+Math.round(v).toLocaleString('pt-BR');
const fmtRFull=v=>v>0?'R$\u00A0'+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'R$\u00A0—';

function totalHoras(acct){
  let v=0,t=0;
  SUBS[acct].forEach(sub=>Object.values(DATA[acct].horas[sub]).forEach(h=>{
    v+=h.v; t+=(h.vm!==undefined?h.vm:h.t*6);
  }));
  return{v,t};
}
function horasPorArea(acct){
  const areas={};
  SUBS[acct].forEach(sub=>Object.entries(DATA[acct].horas[sub]).forEach(([a,h])=>{
    if(!areas[a]) areas[a]={v:0,t:0};
    areas[a].v+=h.v; areas[a].t+=(h.vm!==undefined?h.vm:h.t*6);
  }));
  return areas;
}
function budgetTotais(acct){
  const camps=DATA[acct].campanhas;
  return{
    midia:        camps.reduce((s,c)=>s+c.midia,0),
    influenciador:camps.reduce((s,c)=>s+c.influenciador,0),
    producao:     camps.reduce((s,c)=>s+c.producao,0),
    total:        camps.reduce((s,c)=>s+c.midia+c.influenciador+c.producao,0),
  };
}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}

// NAV
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='overview') renderOverview();
  else if(id==='risque')  renderSub('risque','base');
  else if(id==='bozzano') renderSub('bozzano','base');
  else if(id==='oetker')  renderDetail('oetker','base');
  else if(id==='suhai')   renderDetail('suhai','base');
  else if(id==='taskrow') renderTaskrow();
}
function showSub(acct,sub,btn){
  document.querySelectorAll('#'+acct+'-subtabs .sub-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderSub(acct,sub);
}
function goToAcct(acct){
  const map={risque:1,bozzano:2,oetker:3,suhai:4};
  document.querySelectorAll('.nav-tab')[map[acct]].click();
}

function renderOverview(){

    const p=pct(tot.v,tot.t);

    const d=DATA[acct];
    const areas=horasPorArea(acct);
    const aKeys=Object.keys(areas);
    const maxT=Math.max(...aKeys.map(a=>areas[a].t),1);
    const bud=budgetTotais(acct);

    let bars='';
    aKeys.forEach(area=>{
      const a=areas[area];
      const ap=pct(a.v,a.t);
      const hT=Math.max(Math.round((a.t/maxT)*48),3);

      <div class="ov-top">
        <div>
          <div class="ov-name" style="color:${color}">${LABELS[acct]}</div>

          <div class="ov-fee-sub">Total contrato: ${fmtR(d.feeTotal)}</div>

          </div>`:''}

// ══════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════
function updateH(acct,sub,area,val){
  DATA[acct].horas[sub][area].v=parseFloat(val)||0;
  refreshDetail(acct,sub);
}

function updateBud(acct,idx,campo,val){
  DATA[acct].campanhas[idx][campo]=parseFloat(val)||0;
  refreshBudKPI(acct);
  refreshBudBars(acct);
}

function refreshBudKPI(acct){
  const bud=budgetTotais(acct);
  const el=id=>document.getElementById(acct+'-bud-'+id);
  if(el('total'))  el('total').textContent =fmtR(bud.total);
  if(el('midia'))  el('midia').textContent =fmtR(bud.midia);
  if(el('inf'))    el('inf').textContent   =fmtR(bud.influenciador);
  if(el('prod'))   el('prod').textContent  =fmtR(bud.producao);
}

function refreshBudBars(acct){
  const bud=budgetTotais(acct);
  const maxB=Math.max(bud.midia,bud.influenciador,bud.producao,1);
  const vals=[bud.midia,bud.influenciador,bud.producao];
  document.querySelectorAll('.bar[data-height]').forEach((b,i)=>{
    if(i<vals.length){
      const h=vals[i]>0?Math.max(Math.round((vals[i]/maxB)*115),4):0;
      b.setAttribute('data-height',h);
      b.style.height=h+'px';
    }
  });
}

function refreshDetail(acct,sub){
  const el=document.getElementById(acct+'-content');
  if(!el) return;
  const tmp=document.createElement('div');
  tmp.innerHTML=buildDetail(acct,sub);
  // atualiza só horas (KPI top + barras), preserva inputs budget
  const newKpi=tmp.querySelector('.kpi-row-4');
  const oldKpi=el.querySelector('.kpi-row-4');
  if(newKpi&&oldKpi) oldKpi.replaceWith(newKpi);
  const newCharts=tmp.querySelectorAll('.chart-card');
  const oldCharts=el.querySelectorAll('.chart-card');
  if(newCharts[0]&&oldCharts[0]) oldCharts[0].replaceWith(newCharts[0]);
  animateBars();
}

// ══════════════════════════════════════════
// ANIMATE
// ══════════════════════════════════════════
function animateBars(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('[data-height]').forEach(b=>{
      const h=b.getAttribute('data-height');
      setTimeout(()=>{b.style.height=h+'px'},60);
    });
  });
}

// CSV
// ══════════════════════════════════════════
function importCSV(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split('\n');
    let imported=0;
    const activeTab=document.querySelector('.nav-tab.active');
    const txt=activeTab?activeTab.textContent.toLowerCase():'';
    const acct=txt.includes('risq')?'risque':txt.includes('bozz')?'bozzano':txt.includes('oet')?'oetker':'suhai';
    lines.slice(1).forEach(line=>{
      const cols=line.split(',').map(c=>c.trim());
      if(cols.length>=2&&DATA[acct].horas.base[cols[0]]!==undefined){
        DATA[acct].horas.base[cols[0]].v=parseFloat(cols[1])||0; imported++;
      }
    });
    showToast('✓ '+imported+' registros importados');
    document.querySelector('.nav-tab.active').click();
    event.target.value='';
  };
  reader.readAsText(file,'UTF-8');
}

function loadSaved(){
  try{

let tkConta='TODAS', tkAba='urgente';

function tkParsePrazo(s){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);}
function tkDias(prazo){return Math.round((tkParsePrazo(prazo)-TK_HOJE)/86400000);}

function tkGetTarefas(){return tkConta==='TODAS'?TK_TAREFAS:TK_TAREFAS.filter(t=>t.conta===tkConta);}

function tkPrazoTag(prazo){
  const d=tkDias(prazo);
  const cor=d<0?'var(--red)':d<=3?'var(--orange)':d<=7?'#FFD600':'var(--green)';
  const lbl=d<0?Math.abs(d)+'d atraso':d===0?'hoje':d+'d';
  return`<span style="background:${cor}22;color:${cor};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap">${lbl}</span>`;
}
function tkFaseBadge(fase){
  const cor=TK_FASE_COR[fase]||'#666';
  return`<span style="background:${cor}22;color:${cor};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap">${fase}</span>`;
}

function renderTaskrow(){
  const el=document.getElementById('taskrow-content');
  el.innerHTML=buildTaskrow();
}

function buildTaskrow(){
  const t=tkGetTarefas();
  const urgentes=t.filter(x=>x.fase!=='Masters'&&tkDias(x.prazo)<=3).sort((a,b)=>tkDias(a.prazo)-tkDias(b.prazo));
  const ajuste=t.filter(x=>x.fase==='Em ajuste');
  const cliente=t.filter(x=>x.fase==='Em aprovação com cliente');
  const naoInic=t.filter(x=>x.fase==='Não iniciada').length;

  // KPIs
  const kpis=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
    ${[
      {lbl:'Total de tarefas',val:t.length,sub:'em aberto',cor:'var(--secondary)'},
      {lbl:'🚨 Em retrabalho',val:ajuste.length,sub:'em ajuste agora',cor:'var(--red)'},
      {lbl:'⏳ Aguardando cliente',val:cliente.length,sub:'aprovações pendentes',cor:'#29B6F6'},
      {lbl:'⚪ Não iniciadas',val:naoInic,sub:'risco de atraso',cor:'var(--muted)'},
    ].map(k=>`<div class="kpi-card" style="border-top:2px solid ${k.cor}">
      <div class="kpi-value" style="color:${k.cor};font-size:26px">${k.val}</div>
      <div class="kpi-label" style="margin-top:6px">${k.lbl}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('')}
  </div>`;

  // Filtros de conta
  const filtros=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
    ${Object.entries(TK_CONTAS).map(([key,val])=>`
      <button onclick="tkSetConta('${key}')" id="tkbtn-${key}"
        style="padding:6px 14px;border-radius:6px;border:1px solid ${tkConta===key?val.cor:'var(--border)'};
        background:${tkConta===key?val.cor+'22':'transparent'};color:${tkConta===key?val.cor:'var(--muted)'};
        font-size:11px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .15s">
        ${val.label}
      </button>`).join('')}
  </div>`;

  // Distribuição por fase (mini bars)
  const faseMap={};
  t.forEach(x=>{faseMap[x.fase]=(faseMap[x.fase]||0)+1;});
  const maxF=Math.max(...Object.values(faseMap),1);
  const faseBars=`<div class="chart-card" style="margin-bottom:20px">
    <div class="chart-title">Distribuição por fase</div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:80px;margin-bottom:8px">
      ${TK_FASES.map(f=>{
        const n=faseMap[f]||0;
        if(!n) return '';
        const h=Math.max(Math.round((n/maxF)*64),4);
        const cor=TK_FASE_COR[f];
        return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="font-size:9px;color:${cor};font-weight:700">${n}</div>
          <div style="width:100%;max-width:32px;height:${h}px;background:${cor}44;border-radius:3px 3px 0 0;border-top:2px solid ${cor}" title="${f}"></div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:4px">
      ${TK_FASES.filter(f=>faseMap[f]).map(f=>`
        <div style="display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted)">
          <div style="width:7px;height:7px;border-radius:2px;background:${TK_FASE_COR[f]}"></div>${f}
        </div>`).join('')}
    </div>
  </div>`;

  // Abas de detalhe
  const items=tkAba==='urgente'?urgentes:tkAba==='ajuste'?ajuste:cliente;
  const abas=`<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    ${[
      {key:'urgente',lbl:`🔴 Urgente esta semana (${urgentes.length})`},
      {key:'ajuste', lbl:`🔄 Em retrabalho (${ajuste.length})`},
      {key:'cliente',lbl:`⏳ Aguardando cliente (${cliente.length})`},
    ].map(a=>`<button onclick="tkSetAba('${a.key}')" style="padding:6px 13px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:Inter,sans-serif;background:${tkAba===a.key?'var(--orange)':'var(--surface2)'};color:${tkAba===a.key?'#fff':'var(--muted)'};transition:all .15s">${a.lbl}</button>`).join('')}
  </div>`;

  const rows=items.length===0
    ?`<div style="text-align:center;color:var(--muted);padding:24px;font-size:13px">Nenhuma tarefa nesta categoria</div>`
    :items.map(tarefa=>{
      const cc=TK_CONTAS[tarefa.conta];
      return`<div style="display:grid;grid-template-columns:80px 88px 90px 1fr 160px;align-items:center;gap:12px;
        padding:9px 14px;border-radius:8px;background:var(--surface);margin-bottom:5px;
        border-left:3px solid ${cc.cor};transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='var(--surface)'">
        <span style="font-size:10px;color:var(--muted);font-family:monospace">${tarefa.id}</span>
        <span style="font-size:10px;font-weight:700;color:${cc.cor};background:${cc.corLight};border-radius:4px;padding:2px 7px;text-align:center">${cc.label}</span>
        ${tkPrazoTag(tarefa.prazo)}
        <span style="font-size:12px;color:var(--secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${tarefa.nome}">${tarefa.nome}</span>
        ${tkFaseBadge(tarefa.fase)}
      </div>`;
    }).join('');

  return`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
      <div style="width:4px;height:30px;border-radius:2px;background:var(--orange)"></div>
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)">Taskrow · 16/06/2026</div>
        <div style="font-size:16px;font-weight:800;letter-spacing:-.3px">Painel de Tarefas — N3</div>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--muted)">100 tarefas · 4 contas</div>
    </div>
    ${kpis}
    ${filtros}
    ${faseBars}
    <div class="chart-card">
      ${abas}
      ${rows}
    </div>`;
}

function tkSetConta(key){tkConta=key;renderTaskrow();}
function tkSetAba(key){tkAba=key;renderTaskrow();}

</script>
</body>
</html>
