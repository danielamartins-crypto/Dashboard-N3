<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N3 Dashboard — Ampfy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --surface2: #1E1E1E;
    --border: #2A2A2A;
    --text: #FFFFFF;
    --text-muted: #666666;
    --text-secondary: #AAAAAA;
    --green: #00E676;
    --yellow: #FFD600;
    --red: #FF3D3D;
    --orange: #FF5C00;
    --orange-dim: rgba(255,92,0,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--orange); }
  .divider-v { width: 1px; height: 20px; background: var(--border); }
  .header-title { font-size: 13px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
    font-family: 'Inter', sans-serif; letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--orange); color: #fff; }
  .btn-primary:hover { background: #e05200; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex; align-items: center; gap: 2px;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 14px 20px; font-size: 13px; font-weight: 500;
    color: var(--text-muted); cursor: pointer; border: none;
    background: transparent; white-space: nowrap;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 600; }

  /* ── SUB TABS (Extra FI) ── */
  .sub-tabs {
    display: flex; gap: 8px; padding: 16px 32px 0;
  }
  .sub-tab {
    padding: 6px 14px; font-size: 11px; font-weight: 600;
    border-radius: 4px; cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    transition: all 0.15s; font-family: 'Inter', sans-serif;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sub-tab:hover { border-color: var(--orange); color: var(--orange); }
  .sub-tab.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }

  /* ── MAIN CONTENT ── */
  .main { padding: 28px 32px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── KPI CARDS ── */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: #3A3A3A; }
  .kpi-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .kpi-badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 10px; font-weight: 700; margin-top: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-green { background: rgba(0,230,118,0.12); color: var(--green); }
  .badge-yellow { background: rgba(255,214,0,0.12); color: var(--yellow); }
  .badge-red { background: rgba(255,61,61,0.12); color: var(--red); }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
  .section-hint { font-size: 11px; color: var(--text-muted); }

  /* ── CHARTS GRID ── */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
  }
  .chart-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 20px; }

  /* ── VERTICAL BAR CHART ── */
  .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 160px; }
  .bar-group { display: flex; flex-direction: column; align-items: center; gap: 0; flex: 1; min-width: 0; }
  .bar-wrap { display: flex; gap: 3px; align-items: flex-end; height: 130px; width: 100%; justify-content: center; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
  .bar {
    width: 100%; border-radius: 3px 3px 0 0;
    transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; cursor: pointer; min-width: 14px; max-width: 32px;
  }
  .bar:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #2A2A2A; color: #fff; padding: 4px 8px; border-radius: 4px;
    font-size: 10px; white-space: nowrap; pointer-events: none; z-index: 10;
  }
  .bar-label { font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 6px; line-height: 1.2; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
  .bar-pct { font-size: 9px; font-weight: 700; color: var(--text-secondary); margin-top: 2px; }

  .bar-green { background: var(--green); }
  .bar-yellow { background: var(--yellow); }
  .bar-red { background: var(--red); }
  .bar-scope { background: var(--border); }

  /* ── LEGEND ── */
  .legend { display: flex; gap: 16px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* ── EDIT TABLE ── */
  .edit-table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; margin-bottom: 24px;
  }
  .edit-table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
  }
  .edit-table { width: 100%; border-collapse: collapse; }
  .edit-table th {
    text-align: left; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted);
    padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
  }
  .edit-table td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .edit-table tr:last-child td { border-bottom: none; }
  .edit-table tr:hover td { background: rgba(255,255,255,0.02); }
  .edit-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 12px; padding: 4px 8px; width: 80px; text-align: right;
    transition: border-color 0.15s;
  }
  .edit-input:focus { outline: none; border-color: var(--orange); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

  /* ── IMPORT AREA ── */
  .import-area {
    border: 1px dashed var(--border); border-radius: 10px;
    padding: 24px; text-align: center; margin-bottom: 24px;
    transition: border-color 0.2s; cursor: pointer;
  }
  .import-area:hover { border-color: var(--orange); }
  .import-icon { font-size: 24px; margin-bottom: 8px; }
  .import-text { font-size: 13px; color: var(--text-muted); }
  .import-text strong { color: var(--orange); }
  .import-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  #csvInput { display: none; }

  /* ── OVERVIEW GRID ── */
  .overview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .overview-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.2s;
  }
  .overview-card:hover { border-color: var(--orange); transform: translateY(-1px); }
  .overview-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .overview-card-name { font-size: 15px; font-weight: 700; }
  .overview-mini-bars { display: flex; gap: 6px; align-items: flex-end; height: 48px; }
  .mini-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .mini-bar { width: 100%; border-radius: 2px 2px 0 0; }
  .mini-label { font-size: 8px; color: var(--text-muted); text-align: center; }
  .overview-stats { display: flex; gap: 20px; }
  .overview-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .overview-stat-value { font-size: 16px; font-weight: 700; margin-top: 2px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 18px; font-size: 13px;
    display: none; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .overview-grid { grid-template-columns: 1fr; }
    .main { padding: 20px 16px; }
    .header { padding: 16px; }
    .nav-tabs { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo">amp<span>fy</span></div>
    <div class="divider-v"></div>
    <div class="header-title">N3 · Dashboard Operacional</div>
  </div>
  <div class="header-actions">
    <label class="btn btn-ghost btn-sm" for="csvInput">⬆ Importar CSV</label>
    <input type="file" id="csvInput" accept=".csv" onchange="importCSV(event)">
    <button class="btn btn-primary btn-sm" onclick="saveAll()">✓ Salvar</button>
  </div>
</header>

<!-- NAV TABS -->
<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('overview', this)">N3 Geral</button>
  <button class="nav-tab" onclick="showPage('risque', this)">Risqué</button>
  <button class="nav-tab" onclick="showPage('bozzano', this)">Bozzano</button>
  <button class="nav-tab" onclick="showPage('oetker', this)">Dr. Oetker</button>
  <button class="nav-tab" onclick="showPage('suhai', this)">Suhai</button>
</nav>

<!-- MAIN -->
<main class="main">

  <!-- ═══════════════════════════════ N3 GERAL ═══════════════════════════════ -->
  <div id="page-overview" class="page active">
    <div class="overview-grid" id="overview-grid"></div>
  </div>

  <!-- ═══════════════════════════════ RISQUÉ ═══════════════════════════════ -->
  <div id="page-risque" class="page">
    <div class="sub-tabs" id="risque-subtabs">
      <button class="sub-tab active" onclick="showSubPage('risque','base',this)">Base</button>
      <button class="sub-tab" onclick="showSubPage('risque','fiscal27',this)">Fiscal 27</button>
      <button class="sub-tab" onclick="showSubPage('risque','belga',this)">Belga</button>
      <button class="sub-tab" onclick="showSubPage('risque','desgel',this)">Desgel Secante</button>
    </div>
    <div style="height:20px"></div>
    <div id="risque-content"></div>
  </div>

  <!-- ═══════════════════════════════ BOZZANO ═══════════════════════════════ -->
  <div id="page-bozzano" class="page">
    <div class="sub-tabs" id="bozzano-subtabs">
      <button class="sub-tab active" onclick="showSubPage('bozzano','base',this)">Base</button>
      <button class="sub-tab" onclick="showSubPage('bozzano','expert',this)">Expert</button>
    </div>
    <div style="height:20px"></div>
    <div id="bozzano-content"></div>
  </div>

  <!-- ═══════════════════════════════ DR. OETKER ═══════════════════════════════ -->
  <div id="page-oetker" class="page">
    <div id="oetker-content"></div>
  </div>

  <!-- ═══════════════════════════════ SUHAI ═══════════════════════════════ -->
  <div id="page-suhai" class="page">
    <div id="suhai-content"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════════
// DATA STORE
// ════════════════════════════════════════════════════════════════════════
const DATA = {
  risque: {
    base:     { horas: { Criação:    {v:40, t:80}, Atendimento:{v:20,t:40}, Mídia:{v:15,t:30}, Produção:{v:10,t:20}, Planejamento:{v:5,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    fiscal27: { horas: { Criação:    {v:60, t:80}, Atendimento:{v:30,t:40}, Mídia:{v:28,t:30}, Produção:{v:18,t:20}, Planejamento:{v:12,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    belga:    { horas: { Criação:    {v:20, t:40}, Atendimento:{v:10,t:20}, Mídia:{v:5, t:20}, Produção:{v:0, t:10}, Planejamento:{v:0,t:10} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    desgel:   { horas: { Criação:    {v:10, t:30}, Atendimento:{v:5, t:15}, Mídia:{v:0, t:10}, Produção:{v:0, t:10}, Planejamento:{v:0,t:10} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
  },
  bozzano: {
    base:   { horas: { Criação:{v:30,t:60}, Atendimento:{v:15,t:30}, Mídia:{v:10,t:20}, Produção:{v:5,t:15}, Planejamento:{v:5,t:15} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    expert: { horas: { Criação:{v:50,t:60}, Atendimento:{v:25,t:30}, Mídia:{v:18,t:20}, Produção:{v:12,t:15}, Planejamento:{v:10,t:15} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
  },
  oetker: {
    base: { horas: { Criação:{v:55,t:80}, Atendimento:{v:28,t:40}, Mídia:{v:20,t:30}, Produção:{v:15,t:20}, Planejamento:{v:8,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } }
  },
  suhai: {
    base: { horas: { Criação:{v:35,t:60}, Atendimento:{v:20,t:35}, Mídia:{v:10,t:20}, Produção:{v:25,t:30}, Planejamento:{v:12,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } }
  }
};

const ACCOUNT_LABELS = { risque:'Risqué', bozzano:'Bozzano', oetker:'Dr. Oetker', suhai:'Suhai' };
const ACCOUNT_COLORS = { risque:'#E91E8C', bozzano:'#2196F3', oetker:'#FF9800', suhai:'#9C27B0' };

// ════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════
function pct(v, t) { return t > 0 ? Math.min(Math.round((v/t)*100), 100) : 0; }
function statusColor(p) { return p >= 90 ? 'var(--red)' : p >= 70 ? 'var(--yellow)' : 'var(--green)'; }
function statusClass(p) { return p >= 90 ? 'badge-red' : p >= 70 ? 'badge-yellow' : 'badge-green'; }
function statusLabel(p) { return p >= 90 ? '⚠ Crítico' : p >= 70 ? '◉ Atenção' : '✓ Saudável'; }

function totalHoras(acct, sub) {
  const d = DATA[acct][sub].horas;
  let v=0, t=0;
  Object.values(d).forEach(x => { v+=x.v; t+=x.t; });
  return {v, t};
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════════════════
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');

  if (id === 'overview') renderOverview();
  else if (id === 'risque') renderSubPage('risque', 'base');
  else if (id === 'bozzano') renderSubPage('bozzano', 'base');
  else if (id === 'oetker') renderAccountPage('oetker', 'base');
  else if (id === 'suhai') renderAccountPage('suhai', 'base');
}

function showSubPage(acct, sub, btn) {
  document.querySelectorAll(`#${acct}-subtabs .sub-tab`).forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderSubPage(acct, sub);
}

// ════════════════════════════════════════════════════════════════════════
// RENDER OVERVIEW
// ════════════════════════════════════════════════════════════════════════
function renderOverview() {
  const grid = document.getElementById('overview-grid');
  let html = '';
  Object.keys(ACCOUNT_LABELS).forEach(acct => {
    const subs = Object.keys(DATA[acct]);
    const mainSub = DATA[acct].base || DATA[acct][subs[0]];
    const areas = Object.keys(mainSub.horas);
    const tot = totalHoras(acct, subs[0]);
    const p = pct(tot.v, tot.t);
    const color = ACCOUNT_COLORS[acct];

    let miniBars = '';
    areas.slice(0,5).forEach(area => {
      const d = mainSub.horas[area];
      const h = Math.round(pct(d.v, d.t) * 0.44);
      miniBars += `<div class="mini-bar-wrap">
        <div class="mini-bar" style="height:${h}px;background:${statusColor(pct(d.v,d.t))};border-radius:2px 2px 0 0;"></div>
        <div class="mini-label">${area.substring(0,3)}</div>
      </div>`;
    });

    const navTarget = acct === 'oetker' ? 'oetker' : acct;
    html += `<div class="overview-card" onclick="goToAccount('${navTarget}')">
      <div class="overview-card-header">
        <div>
          <div style="font-size:10px;color:${color};font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">${acct === 'oetker' ? 'Dr. Oetker' : ACCOUNT_LABELS[acct]}</div>
          <div style="font-size:22px;font-weight:800;letter-spacing:-1px;">${p}%<span style="font-size:13px;font-weight:400;color:var(--text-muted);margin-left:4px;">consumido</span></div>
        </div>
        <div style="text-align:right;">
          <span class="kpi-badge ${statusClass(p)}">${statusLabel(p)}</span>
          <div style="font-size:11px;color:var(--text-muted);margin-top:8px;">${tot.v}h / ${tot.t}h</div>
        </div>
      </div>
      <div class="overview-mini-bars" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px;">${miniBars}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

function goToAccount(acct) {
  const tabMap = { risque:1, bozzano:2, oetker:3, suhai:4 };
  const tabs = document.querySelectorAll('.nav-tab');
  const idx = tabMap[acct];
  if (tabs[idx]) tabs[idx].click();
}

// ════════════════════════════════════════════════════════════════════════
// RENDER ACCOUNT PAGE (Oetker, Suhai)
// ════════════════════════════════════════════════════════════════════════
function renderAccountPage(acct, sub) {
  const el = document.getElementById(acct+'-content');
  el.innerHTML = buildAccountHTML(acct, sub);
  animateBars();
}

function renderSubPage(acct, sub) {
  const el = document.getElementById(acct+'-content');
  el.innerHTML = buildAccountHTML(acct, sub);
  animateBars();
}

function buildAccountHTML(acct, sub) {
  const d = DATA[acct][sub];
  const horas = d.horas;
  const budget = d.budget;
  const areas = Object.keys(horas);
  const budgetAreas = Object.keys(budget);

  // KPI totals
  let totalV=0, totalT=0;
  areas.forEach(a => { totalV+=horas[a].v; totalT+=horas[a].t; });
  const totalP = pct(totalV, totalT);

  let budgetV=0, budgetT=0;
  budgetAreas.forEach(a => { budgetV+=budget[a].v; budgetT+=budget[a].t; });
  const budgetP = pct(budgetV, budgetT);

  const acctColor = ACCOUNT_COLORS[acct] || 'var(--orange)';
  const subLabel = sub === 'base' ? '' : ` · ${sub.charAt(0).toUpperCase()+sub.slice(1)}`;
  const label = ACCOUNT_LABELS[acct] + subLabel;

  // ── KPI CARDS
  let kpiHTML = `<div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Horas Consumidas</div>
      <div class="kpi-value" style="color:${statusColor(totalP)}">${totalV}h</div>
      <div class="kpi-sub">de ${totalT}h contratadas</div>
      <span class="kpi-badge ${statusClass(totalP)}">${statusLabel(totalP)}</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Escopo Disponível</div>
      <div class="kpi-value">${totalT - totalV}h</div>
      <div class="kpi-sub">horas restantes</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">% Escopo Consumido</div>
      <div class="kpi-value" style="color:${statusColor(totalP)}">${totalP}%</div>
      <div class="kpi-sub">do total contratado</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Budget Total</div>
      <div class="kpi-value">${budgetT > 0 ? 'R$'+budgetT.toLocaleString('pt-BR') : '—'}</div>
      <div class="kpi-sub">${budgetT > 0 ? 'R$'+budgetV.toLocaleString('pt-BR')+' consumido' : 'Aguardando dados'}</div>
    </div>
  </div>`;

  // ── HORAS BARS
  const maxH = Math.max(...areas.map(a => horas[a].t), 1);
  let horasBars = '';
  areas.forEach(a => {
    const p = pct(horas[a].v, horas[a].t);
    const hV = Math.max(Math.round((horas[a].v / maxH) * 120), 2);
    const hT = Math.round((horas[a].t / maxH) * 120);
    horasBars += `<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar-col">
          <div class="bar bar-scope" style="height:${hT}px;" data-tip="Escopo: ${horas[a].t}h"></div>
        </div>
        <div class="bar-col">
          <div class="bar" style="height:0px;background:${statusColor(p)};" data-height="${hV}" data-tip="${horas[a].v}h consumidas (${p}%)"></div>
        </div>
      </div>
      <div class="bar-label">${a}</div>
      <div class="bar-pct" style="color:${statusColor(p)}">${p}%</div>
    </div>`;
  });

  // ── BUDGET BARS
  const maxB = Math.max(...budgetAreas.map(a => budget[a].t), 1);
  let budgetBars = '';
  budgetAreas.forEach(a => {
    const p = pct(budget[a].v, budget[a].t);
    const hV = budget[a].v > 0 ? Math.max(Math.round((budget[a].v/maxB)*120), 2) : 0;
    const hT = budget[a].t > 0 ? Math.round((budget[a].t/maxB)*120) : 30;
    budgetBars += `<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar-col">
          <div class="bar bar-scope" style="height:${hT}px;" data-tip="Budget: ${budget[a].t > 0 ? 'R$'+budget[a].t.toLocaleString('pt-BR') : 'Não definido'}"></div>
        </div>
        <div class="bar-col">
          <div class="bar" style="height:0px;background:${budget[a].v>0?statusColor(p):'var(--border)'};" data-height="${hV}" data-tip="${budget[a].v>0?'R$'+budget[a].v.toLocaleString('pt-BR')+' ('+p+'%)':'Sem dados'}"></div>
        </div>
      </div>
      <div class="bar-label">${a}</div>
      <div class="bar-pct" style="color:${budget[a].v>0?statusColor(p):'var(--text-muted)'};">${budget[a].t>0?p+'%':'—'}</div>
    </div>`;
  });

  // ── EDIT TABLE HORAS
  let editRowsH = '';
  areas.forEach(a => {
    const p2 = pct(horas[a].v, horas[a].t);
    editRowsH += `<tr>
      <td><span class="status-dot" style="background:${statusColor(p2)}"></span>${a}</td>
      <td><input class="edit-input" type="number" min="0" value="${horas[a].v}" onchange="updateHoras('${acct}','${sub}','${a}','v',this.value)" /></td>
      <td><input class="edit-input" type="number" min="0" value="${horas[a].t}" onchange="updateHoras('${acct}','${sub}','${a}','t',this.value)" /></td>
      <td style="color:${statusColor(p2)};font-weight:700;">${p2}%</td>
      <td><span class="kpi-badge ${statusClass(p2)}">${statusLabel(p2)}</span></td>
    </tr>`;
  });

  // ── EDIT TABLE BUDGET
  let editRowsB = '';
  budgetAreas.forEach(a => {
    const p2 = pct(budget[a].v, budget[a].t);
    editRowsB += `<tr>
      <td><span class="status-dot" style="background:${budget[a].t>0?statusColor(p2):'var(--border)'}"></span>${a}</td>
      <td><input class="edit-input" type="number" min="0" value="${budget[a].v}" onchange="updateBudget('${acct}','${sub}','${a}','v',this.value)" /></td>
      <td><input class="edit-input" type="number" min="0" value="${budget[a].t}" onchange="updateBudget('${acct}','${sub}','${a}','t',this.value)" /></td>
      <td style="color:${budget[a].t>0?statusColor(p2):'var(--text-muted)'};font-weight:700;">${budget[a].t>0?p2+'%':'—'}</td>
      <td>${budget[a].t>0?`<span class="kpi-badge ${statusClass(p2)}">${statusLabel(p2)}</span>`:'<span style="color:var(--text-muted);font-size:11px;">Aguardando</span>'}</td>
    </tr>`;
  });

  return `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div style="width:4px;height:32px;background:${acctColor};border-radius:2px;"></div>
      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px;">${label}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Atualizado manualmente · edite os campos abaixo ou importe CSV</div>
      </div>
    </div>

    ${kpiHTML}

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Consumo de Horas por Área</div>
        <div class="bar-chart">${horasBars}</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Escopo</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Consumido &lt;70%</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Atenção 70–90%</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Crítico +90%</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Budget por Categoria</div>
        <div class="bar-chart">${budgetBars}</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Contratado</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Consumido</div>
        </div>
      </div>
    </div>

    <div class="edit-table-wrap">
      <div class="edit-table-header">
        <span class="section-title">✏ Edição · Horas por Área</span>
        <span class="section-hint">Clique nos campos para editar</span>
      </div>
      <table class="edit-table">
        <thead><tr><th>Área</th><th>Consumido (h)</th><th>Escopo (h)</th><th>%</th><th>Status</th></tr></thead>
        <tbody>${editRowsH}</tbody>
      </table>
    </div>

    <div class="edit-table-wrap">
      <div class="edit-table-header">
        <span class="section-title">✏ Edição · Budget por Categoria</span>
        <span class="section-hint">Valores em R$</span>
      </div>
      <table class="edit-table">
        <thead><tr><th>Categoria</th><th>Consumido (R$)</th><th>Contratado (R$)</th><th>%</th><th>Status</th></tr></thead>
        <tbody>${editRowsB}</tbody>
      </table>
    </div>

    <div class="import-area" onclick="document.getElementById('csvInput').click()">
      <div class="import-icon">📂</div>
      <div class="import-text">Clique para <strong>importar CSV</strong> com dados de horas</div>
      <div class="import-hint">Formato esperado: Área, Consumido, Escopo</div>
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════════
// UPDATE DATA
// ════════════════════════════════════════════════════════════════════════
function updateHoras(acct, sub, area, key, val) {
  DATA[acct][sub].horas[area][key] = parseFloat(val) || 0;
  refreshCharts(acct, sub);
}

function updateBudget(acct, sub, area, key, val) {
  DATA[acct][sub].budget[area][key] = parseFloat(val) || 0;
  refreshCharts(acct, sub);
}

function refreshCharts(acct, sub) {
  // Re-render just the chart cards and KPIs without losing focus
  const contentEl = document.getElementById(acct+'-content');
  if (!contentEl) return;
  const html = buildAccountHTML(acct, sub);
  // Only update bar charts + KPIs, preserve inputs
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  // Update KPI row
  const newKpi = tmp.querySelector('.kpi-row');
  const oldKpi = contentEl.querySelector('.kpi-row');
  if (newKpi && oldKpi) oldKpi.replaceWith(newKpi);

  // Update charts
  const newCharts = tmp.querySelectorAll('.chart-card');
  const oldCharts = contentEl.querySelectorAll('.chart-card');
  newCharts.forEach((c,i) => { if (oldCharts[i]) oldCharts[i].replaceWith(c); });

  animateBars();
}

// ════════════════════════════════════════════════════════════════════════
// ANIMATE BARS
// ════════════════════════════════════════════════════════════════════════
function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar[data-height]').forEach(bar => {
      const h = bar.getAttribute('data-height');
      setTimeout(() => { bar.style.height = h + 'px'; }, 50);
    });
  });
}

// ════════════════════════════════════════════════════════════════════════
// CSV IMPORT
// ════════════════════════════════════════════════════════════════════════
function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.trim().split('\n');
    // Expected: Conta, Sub, Área, Consumido, Escopo
    // OR: Área, Consumido, Escopo (applies to current open account)
    let imported = 0;
    lines.slice(1).forEach(line => {
      const cols = line.split(',').map(c => c.trim());
      if (cols.length >= 3) {
        let acct, sub, area, v, t;
        if (cols.length >= 5) {
          acct = cols[0].toLowerCase(); sub = cols[1].toLowerCase();
          area = cols[2]; v = parseFloat(cols[3]); t = parseFloat(cols[4]);
        } else {
          // Try to detect current active tab
          const activeTab = document.querySelector('.nav-tab.active');
          const tabText = activeTab ? activeTab.textContent.toLowerCase() : '';
          acct = tabText === 'risqué' ? 'risque' : tabText === 'bozzano' ? 'bozzano' : tabText === 'dr. oetker' ? 'oetker' : 'suhai';
          sub = 'base'; area = cols[0]; v = parseFloat(cols[1]); t = parseFloat(cols[2]);
        }
        if (DATA[acct] && DATA[acct][sub] && DATA[acct][sub].horas[area] !== undefined) {
          DATA[acct][sub].horas[area] = {v, t};
          imported++;
        }
      }
    });
    showToast(`✓ ${imported} registros importados com sucesso`);
    // Re-render active page
    const activeTab = document.querySelector('.nav-tab.active');
    if (activeTab) activeTab.click();
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

// ════════════════════════════════════════════════════════════════════════
// SAVE
// ════════════════════════════════════════════════════════════════════════
function saveAll() {
  try {
    localStorage.setItem('n3_dashboard_data', JSON.stringify(DATA));
    showToast('✓ Dados salvos com sucesso');
  } catch(e) {
    showToast('⚠ Não foi possível salvar');
  }
}

function loadSaved() {
  try {
    const saved = localStorage.getItem('n3_dashboard_data');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge saved into DATA
      Object.keys(parsed).forEach(acct => {
        if (DATA[acct]) {
          Object.keys(parsed[acct]).forEach(sub => {
            if (DATA[acct][sub]) {
              DATA[acct][sub] = parsed[acct][sub];
            }
          });
        }
      });
    }
  } catch(e) {}
}

// ════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════
loadSaved();
renderOverview();
</script>
