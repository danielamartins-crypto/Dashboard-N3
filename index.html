<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N3 Dashboard — Ampfy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A; --surface: #141414; --surface2: #1E1E1E;
    --border: #2A2A2A; --text: #FFFFFF; --text-muted: #666666;
    --text-secondary: #AAAAAA; --green: #00E676; --yellow: #FFD600;
    --red: #FF3D3D; --orange: #FF5C00; --orange-dim: rgba(255,92,0,0.12);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 14px; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
  .logo span { color: var(--orange); }
  .divider-v { width: 1px; height: 20px; background: var(--border); }
  .header-title { font-size: 12px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: 'Inter', sans-serif; }
  .btn-primary { background: var(--orange); color: #fff; }
  .btn-primary:hover { background: #e05200; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }

  /* NAV */
  .nav-tabs { display: flex; align-items: center; gap: 2px; padding: 0 32px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border: none; background: transparent; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; font-family: 'Inter', sans-serif; }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 700; }

  /* SUB TABS */
  .sub-tabs { display: flex; gap: 8px; padding: 16px 32px 0; }
  .sub-tab { padding: 6px 14px; font-size: 11px; font-weight: 600; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: all 0.15s; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
  .sub-tab:hover { border-color: var(--orange); color: var(--orange); }
  .sub-tab.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }

  /* MAIN */
  .main { padding: 28px 32px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── OVERVIEW CARDS ── */
  .overview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .ov-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; cursor: pointer; transition: all 0.2s; }
  .ov-card:hover { border-color: #3A3A3A; transform: translateY(-1px); }

  .ov-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .ov-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
  .ov-pct { font-size: 32px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; }
  .ov-pct-label { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }
  .ov-hours { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .ov-right { text-align: right; }
  .ov-escopo-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .ov-escopo-value { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .ov-escopo-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .kpi-badge { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
  .badge-green { background: rgba(0,230,118,0.12); color: var(--green); }
  .badge-yellow { background: rgba(255,214,0,0.12); color: var(--yellow); }
  .badge-red { background: rgba(255,61,61,0.12); color: var(--red); }

  /* DIVISOR */
  .ov-divider { border: none; border-top: 1px solid var(--border); margin: 0 0 16px; }

  /* MINI CHART — barras verticais por área */
  .ov-chart-title { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .ov-bars { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
  .ov-bar-group { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .ov-bar-cols { display: flex; gap: 2px; align-items: flex-end; height: 64px; width: 100%; justify-content: center; }
  .ov-bar-col { display: flex; flex-direction: column; justify-content: flex-end; flex: 1; max-width: 18px; }
  .ov-bar { width: 100%; border-radius: 2px 2px 0 0; position: relative; cursor: default; transition: height 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .ov-bar:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #2A2A2A; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; z-index: 20; }
  .ov-bar-label { font-size: 9px; color: var(--text-muted); margin-top: 5px; text-align: center; text-transform: uppercase; letter-spacing: 0.3px; }

  .ov-legend { display: flex; gap: 12px; margin-top: 10px; }
  .ov-legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--text-muted); }
  .ov-legend-dot { width: 7px; height: 7px; border-radius: 1px; }

  /* ── DETAIL PAGE ── */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .kpi-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .chart-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 20px; }

  .bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 160px; }
  .bar-group { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .bar-wrap { display: flex; gap: 3px; align-items: flex-end; height: 130px; width: 100%; justify-content: center; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; position: relative; cursor: pointer; min-width: 12px; max-width: 28px; transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .bar:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #2A2A2A; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; z-index: 10; }
  .bar-label { font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 6px; line-height: 1.3; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
  .bar-pct { font-size: 9px; font-weight: 700; color: var(--text-secondary); margin-top: 2px; }
  .bar-scope { background: var(--border); }

  .legend { display: flex; gap: 16px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .edit-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  .edit-table-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); }
  .section-hint { font-size: 11px; color: var(--text-muted); }
  .edit-table { width: 100%; border-collapse: collapse; }
  .edit-table th { text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .edit-table td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .edit-table tr:last-child td { border-bottom: none; }
  .edit-table tr:hover td { background: rgba(255,255,255,0.02); }
  .edit-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px; padding: 4px 8px; width: 90px; text-align: right; transition: border-color 0.15s; }
  .edit-input:focus { outline: none; border-color: var(--orange); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

  .import-area { border: 1px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; margin-bottom: 24px; transition: border-color 0.2s; cursor: pointer; }
  .import-area:hover { border-color: var(--orange); }
  .import-text { font-size: 13px; color: var(--text-muted); }
  .import-text strong { color: var(--orange); }
  .import-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  #csvInput { display: none; }

  .acct-heading { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .acct-bar { width: 4px; height: 32px; border-radius: 2px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 13px; display: none; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .toast.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  @media(max-width:768px) {
    .overview-grid { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: repeat(2,1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .main { padding: 20px 16px; }
    .header, .nav-tabs { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">amp<span>fy</span></div>
    <div class="divider-v"></div>
    <div class="header-title">N3 · Dashboard Operacional</div>
  </div>
  <div class="header-actions">
    <label class="btn btn-ghost" for="csvInput" style="font-size:12px;padding:7px 14px;">⬆ Importar CSV</label>
    <input type="file" id="csvInput" accept=".csv" onchange="importCSV(event)">
    <button class="btn btn-primary" style="font-size:12px;padding:7px 14px;" onclick="saveAll()">✓ Salvar</button>
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('overview',this)">N3 Geral</button>
  <button class="nav-tab" onclick="showPage('risque',this)">Risqué</button>
  <button class="nav-tab" onclick="showPage('bozzano',this)">Bozzano</button>
  <button class="nav-tab" onclick="showPage('oetker',this)">Dr. Oetker</button>
  <button class="nav-tab" onclick="showPage('suhai',this)">Suhai</button>
</nav>

<main class="main">

  <div id="page-overview" class="page active">
    <div class="overview-grid" id="overview-grid"></div>
  </div>

  <div id="page-risque" class="page">
    <div class="sub-tabs" id="risque-subtabs">
      <button class="sub-tab active" onclick="showSubPage('risque','base',this)">Base</button>
      <button class="sub-tab" onclick="showSubPage('risque','fiscal27',this)">Fiscal 27</button>
      <button class="sub-tab" onclick="showSubPage('risque','belga',this)">Belga</button>
      <button class="sub-tab" onclick="showSubPage('risque','desgel',this)">Desgel Secante</button>
    </div>
    <div style="height:20px"></div>
    <div id="risque-content"></div>
  </div>

  <div id="page-bozzano" class="page">
    <div class="sub-tabs" id="bozzano-subtabs">
      <button class="sub-tab active" onclick="showSubPage('bozzano','base',this)">Base</button>
      <button class="sub-tab" onclick="showSubPage('bozzano','expert',this)">Expert</button>
    </div>
    <div style="height:20px"></div>
    <div id="bozzano-content"></div>
  </div>

  <div id="page-oetker" class="page">
    <div id="oetker-content"></div>
  </div>

  <div id="page-suhai" class="page">
    <div id="suhai-content"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const DATA = {
  risque: {
    escopoTotal: 0,
    base:     { horas: { Criação:{v:40,t:80}, Atendimento:{v:20,t:40}, Mídia:{v:15,t:30}, Produção:{v:10,t:20}, Planejamento:{v:5,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    fiscal27: { horas: { Criação:{v:60,t:80}, Atendimento:{v:30,t:40}, Mídia:{v:28,t:30}, Produção:{v:18,t:20}, Planejamento:{v:12,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    belga:    { horas: { Criação:{v:20,t:40}, Atendimento:{v:10,t:20}, Mídia:{v:5,t:20},  Produção:{v:0,t:10},  Planejamento:{v:0,t:10}  }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    desgel:   { horas: { Criação:{v:10,t:30}, Atendimento:{v:5,t:15},  Mídia:{v:0,t:10},  Produção:{v:0,t:10},  Planejamento:{v:0,t:10}  }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
  },
  bozzano: {
    escopoTotal: 0,
    base:   { horas: { Criação:{v:30,t:60}, Atendimento:{v:15,t:30}, Mídia:{v:10,t:20}, Produção:{v:5,t:15},  Planejamento:{v:5,t:15}  }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
    expert: { horas: { Criação:{v:50,t:60}, Atendimento:{v:25,t:30}, Mídia:{v:18,t:20}, Produção:{v:12,t:15}, Planejamento:{v:10,t:15} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } },
  },
  oetker: {
    escopoTotal: 0,
    base: { horas: { Criação:{v:55,t:80}, Atendimento:{v:28,t:40}, Mídia:{v:20,t:30}, Produção:{v:15,t:20}, Planejamento:{v:8,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } }
  },
  suhai: {
    escopoTotal: 0,
    base: { horas: { Criação:{v:35,t:60}, Atendimento:{v:20,t:35}, Mídia:{v:10,t:20}, Produção:{v:25,t:30}, Planejamento:{v:12,t:20} }, budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} } }
  }
};

const LABELS  = { risque:'Risqué', bozzano:'Bozzano', oetker:'Dr. Oetker', suhai:'Suhai' };
const COLORS  = { risque:'#E91E8C', bozzano:'#2196F3', oetker:'#FF9800', suhai:'#9C27B0' };
const SUBS    = { risque:['base','fiscal27','belga','desgel'], bozzano:['base','expert'], oetker:['base'], suhai:['base'] };

// ── helpers ──
function pct(v,t){ return t>0 ? Math.min(Math.round((v/t)*100),100) : 0; }
function sColor(p){ return p>=90?'var(--red)':p>=70?'var(--yellow)':'var(--green)'; }
function sCls(p)  { return p>=90?'badge-red':p>=70?'badge-yellow':'badge-green'; }
function sLbl(p)  { return p>=90?'⚠ Crítico':p>=70?'◉ Atenção':'✓ Saudável'; }

function totalHorasConta(acct) {
  let v=0, t=0;
  SUBS[acct].forEach(sub => {
    Object.values(DATA[acct][sub].horas).forEach(h => { v+=h.v; t+=h.t; });
  });
  return {v,t};
}

function horasPorArea(acct) {
  // Aggregate all subs into areas
  const areas = {};
  SUBS[acct].forEach(sub => {
    Object.entries(DATA[acct][sub].horas).forEach(([area, h]) => {
      if (!areas[area]) areas[area] = {v:0, t:0};
      areas[area].v += h.v;
      areas[area].t += h.t;
    });
  });
  return areas;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if (id==='overview') renderOverview();
  else if (id==='risque')  renderSubPage('risque','base');
  else if (id==='bozzano') renderSubPage('bozzano','base');
  else if (id==='oetker')  renderAccountPage('oetker','base');
  else if (id==='suhai')   renderAccountPage('suhai','base');
}

function showSubPage(acct, sub, btn) {
  document.querySelectorAll('#'+acct+'-subtabs .sub-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderSubPage(acct, sub);
}

function goToAccount(acct) {
  const map = {risque:1,bozzano:2,oetker:3,suhai:4};
  document.querySelectorAll('.nav-tab')[map[acct]].click();
}

// ══════════════════════════════════════════════
// RENDER OVERVIEW
// ══════════════════════════════════════════════
function renderOverview() {
  const grid = document.getElementById('overview-grid');
  let html = '';

  Object.keys(LABELS).forEach(acct => {
    const tot   = totalHorasConta(acct);
    const p     = pct(tot.v, tot.t);
    const color = COLORS[acct];
    const escopo = DATA[acct].escopoTotal;
    const areas  = horasPorArea(acct);
    const areaKeys = Object.keys(areas);

    // max vendido para escalar barras
    const maxT = Math.max(...areaKeys.map(a => areas[a].t), 1);

    let bars = '';
    areaKeys.forEach(area => {
      const a = areas[area];
      const ap = pct(a.v, a.t);
      const hT = Math.max(Math.round((a.t/maxT)*56), 4);
      const hV = a.v>0 ? Math.max(Math.round((a.v/maxT)*56), 2) : 0;
      const shortName = area.substring(0,3).toUpperCase();
      bars += `<div class="ov-bar-group">
        <div class="ov-bar-cols">
          <div class="ov-bar-col">
            <div class="ov-bar bar-scope" style="height:${hT}px" data-tip="Vendido: ${a.t}h"></div>
          </div>
          <div class="ov-bar-col">
            <div class="ov-bar" style="height:0px;background:${sColor(ap)}" data-height="${hV}" data-tip="${area}: ${a.v}h/${a.t}h (${ap}%)"></div>
          </div>
        </div>
        <div class="ov-bar-label">${shortName}</div>
      </div>`;
    });

    html += `<div class="ov-card" onclick="goToAccount('${acct}')">
      <div class="ov-top">
        <div>
          <div class="ov-name" style="color:${color}">${LABELS[acct]}</div>
          <div class="ov-pct" style="color:${sColor(p)}">${p}<span class="ov-pct-label">% consumido</span></div>
          <div class="ov-hours">${tot.v}h consumidas · ${tot.t}h vendidas</div>
          <span class="kpi-badge ${sCls(p)}">${sLbl(p)}</span>
        </div>
        <div class="ov-right">
          <div class="ov-escopo-label">Escopo Total</div>
          <div class="ov-escopo-value">${escopo>0 ? 'R$'+escopo.toLocaleString('pt-BR') : '—'}</div>
          <div class="ov-escopo-sub">${escopo>0 ? 'valor contratado' : 'inserir valor'}</div>
          <div style="margin-top:12px;">
            <input class="edit-input" type="number" min="0" placeholder="R$ Escopo"
              value="${escopo>0?escopo:''}"
              onclick="event.stopPropagation()"
              onchange="DATA['${acct}'].escopoTotal=parseFloat(this.value)||0;renderOverview()"
              style="width:110px;font-size:11px;padding:4px 8px;text-align:right;" />
          </div>
        </div>
      </div>
      <hr class="ov-divider">
      <div class="ov-chart-title">Horas por área — consumido vs. vendido</div>
      <div class="ov-bars">${bars}</div>
      <div class="ov-legend">
        <div class="ov-legend-item"><div class="ov-legend-dot" style="background:var(--border)"></div>Vendido</div>
        <div class="ov-legend-item"><div class="ov-legend-dot" style="background:var(--green)"></div>&lt;70%</div>
        <div class="ov-legend-item"><div class="ov-legend-dot" style="background:var(--yellow)"></div>70–90%</div>
        <div class="ov-legend-item"><div class="ov-legend-dot" style="background:var(--red)"></div>+90%</div>
      </div>
    </div>`;
  });

  grid.innerHTML = html;
  animateBars();
}

// ══════════════════════════════════════════════
// RENDER DETAIL
// ══════════════════════════════════════════════
function renderAccountPage(acct, sub) {
  document.getElementById(acct+'-content').innerHTML = buildDetailHTML(acct, sub);
  animateBars();
}
function renderSubPage(acct, sub) {
  document.getElementById(acct+'-content').innerHTML = buildDetailHTML(acct, sub);
  animateBars();
}

function buildDetailHTML(acct, sub) {
  const d      = DATA[acct][sub];
  const horas  = d.horas;
  const budget = d.budget;
  const aKeys  = Object.keys(horas);
  const bKeys  = Object.keys(budget);
  const color  = COLORS[acct];

  let totV=0, totT=0;
  aKeys.forEach(a => { totV+=horas[a].v; totT+=horas[a].t; });
  const totP = pct(totV, totT);

  let budV=0, budT=0;
  bKeys.forEach(a => { budV+=budget[a].v; budT+=budget[a].t; });

  const subLabel = sub==='base' ? '' : ' · '+({fiscal27:'Fiscal 27',belga:'Belga',desgel:'Desgel Secante',expert:'Expert'}[sub]||sub);

  // KPI
  const kpi = `<div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Horas Consumidas</div>
      <div class="kpi-value" style="color:${sColor(totP)}">${totV}h</div>
      <div class="kpi-sub">de ${totT}h vendidas</div>
      <span class="kpi-badge ${sCls(totP)}" style="margin-top:8px;display:inline-block">${sLbl(totP)}</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Horas Disponíveis</div>
      <div class="kpi-value">${totT-totV}h</div>
      <div class="kpi-sub">restantes no escopo</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">% Escopo Consumido</div>
      <div class="kpi-value" style="color:${sColor(totP)}">${totP}%</div>
      <div class="kpi-sub">do total vendido</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Budget</div>
      <div class="kpi-value">${budT>0?'R$'+budT.toLocaleString('pt-BR'):'—'}</div>
      <div class="kpi-sub">${budT>0?'R$'+budV.toLocaleString('pt-BR')+' consumido':'Aguardando dados'}</div>
    </div>
  </div>`;

  // Barras horas
  const maxH = Math.max(...aKeys.map(a=>horas[a].t),1);
  let horasBars = '';
  aKeys.forEach(a => {
    const ap = pct(horas[a].v, horas[a].t);
    const hT = Math.max(Math.round((horas[a].t/maxH)*120), 4);
    const hV = horas[a].v>0 ? Math.max(Math.round((horas[a].v/maxH)*120), 2) : 0;
    horasBars += `<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar-col"><div class="bar bar-scope" style="height:${hT}px" data-tip="Vendido: ${horas[a].t}h"></div></div>
        <div class="bar-col"><div class="bar" style="height:0px;background:${sColor(ap)}" data-height="${hV}" data-tip="${horas[a].v}h consumidas (${ap}%)"></div></div>
      </div>
      <div class="bar-label">${a}</div>
      <div class="bar-pct" style="color:${sColor(ap)}">${ap}%</div>
    </div>`;
  });

  // Barras budget
  const maxB = Math.max(...bKeys.map(a=>budget[a].t),1);
  let budgetBars = '';
  bKeys.forEach(a => {
    const ap = pct(budget[a].v, budget[a].t);
    const hT = budget[a].t>0 ? Math.max(Math.round((budget[a].t/maxB)*120),4) : 30;
    const hV = budget[a].v>0 ? Math.max(Math.round((budget[a].v/maxB)*120),2) : 0;
    budgetBars += `<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar-col"><div class="bar bar-scope" style="height:${hT}px" data-tip="Contratado: ${budget[a].t>0?'R$'+budget[a].t.toLocaleString('pt-BR'):'—'}"></div></div>
        <div class="bar-col"><div class="bar" style="height:0px;background:${budget[a].v>0?sColor(ap):'var(--border)'}" data-height="${hV}" data-tip="${budget[a].v>0?'R$'+budget[a].v.toLocaleString('pt-BR')+' ('+ap+'%)':'Sem dados'}"></div></div>
      </div>
      <div class="bar-label">${a}</div>
      <div class="bar-pct" style="color:${budget[a].t>0?sColor(ap):'var(--text-muted)'}">${budget[a].t>0?ap+'%':'—'}</div>
    </div>`;
  });

  // Tabela horas
  let rowsH = '';
  aKeys.forEach(a => {
    const ap = pct(horas[a].v, horas[a].t);
    rowsH += `<tr>
      <td><span class="status-dot" style="background:${sColor(ap)}"></span>${a}</td>
      <td><input class="edit-input" type="number" min="0" value="${horas[a].v}" onchange="updateHoras('${acct}','${sub}','${a}','v',this.value)"/></td>
      <td><input class="edit-input" type="number" min="0" value="${horas[a].t}" onchange="updateHoras('${acct}','${sub}','${a}','t',this.value)"/></td>
      <td style="color:${sColor(ap)};font-weight:700">${ap}%</td>
      <td><span class="kpi-badge ${sCls(ap)}">${sLbl(ap)}</span></td>
    </tr>`;
  });

  // Tabela budget
  let rowsB = '';
  bKeys.forEach(a => {
    const ap = pct(budget[a].v, budget[a].t);
    rowsB += `<tr>
      <td><span class="status-dot" style="background:${budget[a].t>0?sColor(ap):'var(--border)'}"></span>${a}</td>
      <td><input class="edit-input" type="number" min="0" value="${budget[a].v}" onchange="updateBudget('${acct}','${sub}','${a}','v',this.value)"/></td>
      <td><input class="edit-input" type="number" min="0" value="${budget[a].t}" onchange="updateBudget('${acct}','${sub}','${a}','t',this.value)"/></td>
      <td style="color:${budget[a].t>0?sColor(ap):'var(--text-muted)'};font-weight:700">${budget[a].t>0?ap+'%':'—'}</td>
      <td>${budget[a].t>0?`<span class="kpi-badge ${sCls(ap)}">${sLbl(ap)}</span>`:'<span style="color:var(--text-muted);font-size:11px">Aguardando</span>'}</td>
    </tr>`;
  });

  return `
    <div class="acct-heading">
      <div class="acct-bar" style="background:${color}"></div>
      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px">${LABELS[acct]}${subLabel}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Edite os campos abaixo ou importe CSV · sem dados de pessoa, apenas por área</div>
      </div>
    </div>
    ${kpi}
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Horas por Área — Consumido vs. Vendido</div>
        <div class="bar-chart">${horasBars}</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Vendido</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Consumido &lt;70%</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>70–90%</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>+90%</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Budget por Categoria</div>
        <div class="bar-chart">${budgetBars}</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Contratado</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Consumido</div>
        </div>
      </div>
    </div>
    <div class="edit-table-wrap">
      <div class="edit-table-header">
        <span class="section-title">✏ Horas por Área</span>
        <span class="section-hint">Clique para editar · sem nomes de pessoas</span>
      </div>
      <table class="edit-table">
        <thead><tr><th>Área</th><th>Consumido (h)</th><th>Vendido (h)</th><th>%</th><th>Status</th></tr></thead>
        <tbody>${rowsH}</tbody>
      </table>
    </div>
    <div class="edit-table-wrap">
      <div class="edit-table-header">
        <span class="section-title">✏ Budget por Categoria</span>
        <span class="section-hint">Valores em R$</span>
      </div>
      <table class="edit-table">
        <thead><tr><th>Categoria</th><th>Consumido (R$)</th><th>Contratado (R$)</th><th>%</th><th>Status</th></tr></thead>
        <tbody>${rowsB}</tbody>
      </table>
    </div>
    <div class="import-area" onclick="document.getElementById('csvInput').click()">
      <div style="font-size:22px;margin-bottom:8px">📂</div>
      <div class="import-text">Clique para <strong>importar CSV</strong> com horas por área</div>
      <div class="import-hint">Formato: Área, Consumido, Vendido — sem colunas de pessoa</div>
    </div>`;
}

// ══════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════
function updateHoras(acct, sub, area, key, val) {
  DATA[acct][sub].horas[area][key] = parseFloat(val)||0;
  refreshCharts(acct, sub);
}
function updateBudget(acct, sub, area, key, val) {
  DATA[acct][sub].budget[area][key] = parseFloat(val)||0;
  refreshCharts(acct, sub);
}
function refreshCharts(acct, sub) {
  const el = document.getElementById(acct+'-content');
  if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = buildDetailHTML(acct, sub);
  const newKpi = tmp.querySelector('.kpi-row');
  const oldKpi = el.querySelector('.kpi-row');
  if (newKpi && oldKpi) oldKpi.replaceWith(newKpi);
  const newCharts = tmp.querySelectorAll('.chart-card');
  const oldCharts = el.querySelectorAll('.chart-card');
  newCharts.forEach((c,i) => { if (oldCharts[i]) oldCharts[i].replaceWith(c); });
  animateBars();
}

// ══════════════════════════════════════════════
// ANIMATE
// ══════════════════════════════════════════════
function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('[data-height]').forEach(bar => {
      const h = bar.getAttribute('data-height');
      setTimeout(() => { bar.style.height = h+'px'; }, 60);
    });
  });
}

// ══════════════════════════════════════════════
// CSV IMPORT
// ══════════════════════════════════════════════
function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split('\n');
    let imported = 0;
    lines.slice(1).forEach(line => {
      const cols = line.split(',').map(c => c.trim());
      if (cols.length >= 3) {
        let acct, sub, area, v, t;
        if (cols.length >= 5) {
          acct=cols[0].toLowerCase(); sub=cols[1].toLowerCase();
          area=cols[2]; v=parseFloat(cols[3]); t=parseFloat(cols[4]);
        } else {
          const activeTab = document.querySelector('.nav-tab.active');
          const txt = activeTab ? activeTab.textContent.toLowerCase() : '';
          acct = txt.includes('risq')?'risque':txt.includes('bozz')?'bozzano':txt.includes('oet')?'oetker':'suhai';
          sub='base'; area=cols[0]; v=parseFloat(cols[1]); t=parseFloat(cols[2]);
        }
        if (DATA[acct] && DATA[acct][sub] && DATA[acct][sub].horas[area]!==undefined) {
          DATA[acct][sub].horas[area]={v,t}; imported++;
        }
      }
    });
    showToast('✓ '+imported+' registros importados');
    document.querySelector('.nav-tab.active').click();
    event.target.value='';
  };
  reader.readAsText(file,'UTF-8');
}

// ══════════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════════
function saveAll() {
  try { localStorage.setItem('n3_v2', JSON.stringify(DATA)); showToast('✓ Salvo com sucesso'); }
  catch(e) { showToast('⚠ Erro ao salvar'); }
}
function loadSaved() {
  try {
    const s = localStorage.getItem('n3_v2');
    if (!s) return;
    const p = JSON.parse(s);
    Object.keys(p).forEach(acct => {
      if (!DATA[acct]) return;
      if (p[acct].escopoTotal !== undefined) DATA[acct].escopoTotal = p[acct].escopoTotal;
      SUBS[acct].forEach(sub => {
        if (p[acct][sub]) DATA[acct][sub] = p[acct][sub];
      });
    });
  } catch(e) {}
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadSaved();
renderOverview();
</script>
