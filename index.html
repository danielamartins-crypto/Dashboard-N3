<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N3 Dashboard — Ampfy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--surface:#141414;--surface2:#1E1E1E;--border:#2A2A2A;
  --text:#FFF;--muted:#666;--secondary:#AAA;
  --green:#00E676;--yellow:#FFD600;--red:#FF3D3D;--orange:#FF5C00;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.logo span{color:var(--orange)}
.dv{width:1px;height:20px;background:var(--border)}
.header-title{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.hactions{display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:#e05200}
.btn-ghost{background:transparent;color:var(--secondary);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}

/* NAV */
.nav-tabs{display:flex;align-items:center;gap:2px;padding:0 32px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:transparent;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif}
.nav-tab:hover{color:var(--secondary)}
.nav-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}

/* SUB TABS */
.sub-tabs{display:flex;gap:8px;padding:16px 32px 0}
.sub-tab{padding:6px 14px;font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.sub-tab:hover{border-color:var(--orange);color:var(--orange)}
.sub-tab.active{background:rgba(255,92,0,.12);border-color:var(--orange);color:var(--orange)}

/* MAIN */
.main{padding:28px 32px}
.page{display:none}.page.active{display:block}

/* OVERVIEW GRID */
.ov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;cursor:pointer;transition:all .2s}
.ov-card:hover{border-color:#3A3A3A;transform:translateY(-1px)}

/* OVERVIEW TOP */
.ov-top{display:grid;grid-template-columns:1fr auto;gap:16px;margin-bottom:20px;align-items:start}
.ov-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.ov-pct{font-size:36px;font-weight:900;letter-spacing:-2px;line-height:1}
.ov-pct-lbl{font-size:12px;font-weight:400;color:var(--muted);margin-left:4px}
.ov-hours{font-size:12px;color:var(--muted);margin-top:4px}
.kpi-badge{display:inline-block;padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:8px}
.badge-green{background:rgba(0,230,118,.12);color:var(--green)}
.badge-yellow{background:rgba(255,214,0,.12);color:var(--yellow)}
.badge-red{background:rgba(255,61,61,.12);color:var(--red)}

/* FEE BOX */
.ov-fee-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:right;min-width:160px}
.ov-fee-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.ov-fee-value{font-size:16px;font-weight:800;letter-spacing:-0.5px;color:var(--orange)}
.ov-fee-sub{font-size:9px;color:var(--muted);margin-top:3px}

/* MINI CHART */
.ov-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.ov-chart-title{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.ov-bars{display:flex;align-items:flex-end;gap:6px;height:72px}
.ov-bar-group{display:flex;flex-direction:column;align-items:center;flex:1}
.ov-bar-cols{display:flex;gap:2px;align-items:flex-end;height:56px;width:100%;justify-content:center}
.ov-bar-col{display:flex;flex-direction:column;justify-content:flex-end;flex:1;max-width:16px}
.ov-bar{width:100%;border-radius:2px 2px 0 0;position:relative;transition:height .5s cubic-bezier(.34,1.56,.64,1)}
.ov-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#2A2A2A;color:#fff;padding:3px 7px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:20;pointer-events:none}
.ov-bar-label{font-size:8px;color:var(--muted);margin-top:4px;text-align:center;text-transform:uppercase;letter-spacing:.3px}

.ov-legend{display:flex;gap:12px;margin-top:10px}
.ov-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.ov-leg-dot{width:6px;height:6px;border-radius:1px}

/* DETAIL */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.kpi-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi-value{font-size:22px;font-weight:800;letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.chart-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:16px}

/* VERTICAL BARS */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:150px}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1}
.bar-wrap{display:flex;gap:3px;align-items:flex-end;height:120px;width:100%;justify-content:center}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:3px 3px 0 0;position:relative;cursor:default;min-width:10px;max-width:26px;transition:height .6s cubic-bezier(.34,1.56,.64,1)}
.bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#2A2A2A;color:#fff;padding:3px 8px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:20;pointer-events:none}
.bar-label{font-size:8px;color:var(--muted);text-align:center;margin-top:5px;line-height:1.3;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.bar-pct{font-size:8px;font-weight:700;margin-top:2px}
.bar-scope{background:var(--border)}

.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:2px}

/* EDIT TABLE */
.edit-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px}
.edit-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--secondary)}
.sec-hint{font-size:10px;color:var(--muted)}
.edit-table{width:100%;border-collapse:collapse}
.edit-table th{text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:9px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.edit-table td{padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px}
.edit-table tr:last-child td{border-bottom:none}
.edit-table tr:hover td{background:rgba(255,255,255,.02)}
.edit-input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:4px 8px;width:88px;text-align:right;transition:border-color .15s}
.edit-input:focus{outline:none;border-color:var(--orange)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}

/* IMPORT */
.import-area{border:1px dashed var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:20px;cursor:pointer;transition:border-color .2s}
.import-area:hover{border-color:var(--orange)}
.import-text{font-size:12px;color:var(--muted)}.import-text strong{color:var(--orange)}
.import-hint{font-size:10px;color:var(--muted);margin-top:3px}
#csvInput{display:none}

.acct-heading{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.acct-bar{width:4px;height:30px;border-radius:2px}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-size:12px;display:none;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .ov-grid,.kpi-row,.charts-row{grid-template-columns:1fr}
  .main{padding:18px 16px}
  .header,.nav-tabs{padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">amp<span>fy</span></div>
    <div class="dv"></div>
    <div class="header-title">N3 · Dashboard Operacional</div>
  </div>
  <div class="hactions">
    <label class="btn btn-ghost" for="csvInput">⬆ Importar CSV</label>
    <input type="file" id="csvInput" accept=".csv" onchange="importCSV(event)">
    <button class="btn btn-primary" onclick="saveAll()">✓ Salvar</button>
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('overview',this)">N3 Geral</button>
  <button class="nav-tab" onclick="showPage('risque',this)">Risqué</button>
  <button class="nav-tab" onclick="showPage('bozzano',this)">Bozzano</button>
  <button class="nav-tab" onclick="showPage('oetker',this)">Dr. Oetker</button>
  <button class="nav-tab" onclick="showPage('suhai',this)">Suhai</button>
</nav>

<main class="main">
  <div id="page-overview" class="page active"><div class="ov-grid" id="ov-grid"></div></div>

  <div id="page-risque" class="page">
    <div class="sub-tabs" id="risque-subtabs">
      <button class="sub-tab active" onclick="showSub('risque','base',this)">Base</button>
      <button class="sub-tab" onclick="showSub('risque','fiscal27',this)">Fiscal 27</button>
      <button class="sub-tab" onclick="showSub('risque','belga',this)">Belga</button>
      <button class="sub-tab" onclick="showSub('risque','desgel',this)">Desgel Secante</button>
    </div>
    <div style="height:20px"></div>
    <div id="risque-content"></div>
  </div>

  <div id="page-bozzano" class="page">
    <div class="sub-tabs" id="bozzano-subtabs">
      <button class="sub-tab active" onclick="showSub('bozzano','base',this)">Base</button>
      <button class="sub-tab" onclick="showSub('bozzano','expert',this)">Expert</button>
    </div>
    <div style="height:20px"></div>
    <div id="bozzano-content"></div>
  </div>

  <div id="page-oetker" class="page"><div id="oetker-content"></div></div>
  <div id="page-suhai" class="page"><div id="suhai-content"></div></div>
</main>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// DADOS REAIS — extraídos dos documentos
// ══════════════════════════════════════════
const DATA = {
  risque: {
    feeMensal: 225805,
    feePeriodo: 'Jul–Dez 2026 (6m)',
    feeTotal: 1354832,
    horas: {
      // t = horas vendidas/mês (65% do time Coty)
      // v = consumido (placeholder — preencher via import/manual)
      base: {
        horas: {
          Planejamento:  {v:0, t:31},
          Criação:       {v:0, t:659},
          'Mídia/BI':    {v:0, t:177},
          Atendimento:   {v:0, t:143},
          Operações:     {v:0, t:143},
        },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      },
      fiscal27: {
        horas: { Planejamento:{v:0,t:31}, Criação:{v:0,t:200}, 'Mídia/BI':{v:0,t:60}, Atendimento:{v:0,t:60}, Operações:{v:0,t:30} },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      },
      belga: {
        horas: { Planejamento:{v:0,t:20}, Criação:{v:0,t:120}, 'Mídia/BI':{v:0,t:40}, Atendimento:{v:0,t:40}, Operações:{v:0,t:20} },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      },
      desgel: {
        horas: { Planejamento:{v:0,t:10}, Criação:{v:0,t:80}, 'Mídia/BI':{v:0,t:20}, Atendimento:{v:0,t:20}, Operações:{v:0,t:10} },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      }
    }
  },
  bozzano: {
    feeMensal: 129919,
    feePeriodo: 'Jul–Dez 2026 (6m)',
    feeTotal: 779514,
    horas: {
      base: {
        horas: {
          Planejamento:  {v:0, t:17},
          Criação:       {v:0, t:353},
          'Mídia/BI':    {v:0, t:95},
          Atendimento:   {v:0, t:77},
          Operações:     {v:0, t:77},
        },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      },
      expert: {
        horas: { Planejamento:{v:0,t:17}, Criação:{v:0,t:150}, 'Mídia/BI':{v:0,t:50}, Atendimento:{v:0,t:40}, Operações:{v:0,t:40} },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      }
    }
  },
  oetker: {
    feeMensal: 240000,
    feePeriodo: 'Jan–Dez 2026 (12m)',
    feeTotal: 2880000,
    horas: {
      base: {
        horas: {
          Atendimento:  {v:0, t:368},
          Operações:    {v:0, t:8},
          Planejamento: {v:0, t:68},
          Criação:      {v:0, t:754},
          Mídia:        {v:0, t:622},
          Dados:        {v:0, t:352},
        },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      }
    }
  },
  suhai: {
    feeMensal: 285526,
    feePeriodo: 'Mai–Dez 2026 (8m)',
    feeTotal: 2284208,
    horas: {
      base: {
        horas: {
          Atendimento:  {v:0, t:308},
          Operações:    {v:0, t:44},
          Planejamento: {v:0, t:100},
          Criação:      {v:0, t:724},
          'Mídia/BI':   {v:0, t:200},
        },
        budget: { Produção:{v:0,t:0}, Mídia:{v:0,t:0}, Influenciadores:{v:0,t:0} }
      }
    }
  }
};

const LABELS = {risque:'Risqué', bozzano:'Bozzano', oetker:'Dr. Oetker', suhai:'Suhai'};
const COLORS = {risque:'#E91E8C', bozzano:'#2196F3', oetker:'#FF9800', suhai:'#9C27B0'};
const SUBS   = {risque:['base','fiscal27','belga','desgel'], bozzano:['base','expert'], oetker:['base'], suhai:['base']};

// helpers
const pct   = (v,t) => t>0 ? Math.min(Math.round((v/t)*100),100) : 0;
const sCol  = p => p>=90?'var(--red)':p>=70?'var(--yellow)':'var(--green)';
const sCls  = p => p>=90?'badge-red':p>=70?'badge-yellow':'badge-green';
const sLbl  = p => p>=90?'⚠ Crítico':p>=70?'◉ Atenção':'✓ Saudável';
const fmtR  = v => 'R$\u00A0'+Math.round(v).toLocaleString('pt-BR');
const fmtH  = v => v+'h';

function totalHorasConta(acct) {
  let v=0,t=0;
  SUBS[acct].forEach(sub => Object.values(DATA[acct].horas[sub].horas).forEach(h=>{v+=h.v;t+=h.t}));
  return {v,t};
}

function horasPorAreaConta(acct) {
  const areas={};
  SUBS[acct].forEach(sub => Object.entries(DATA[acct].horas[sub].horas).forEach(([a,h])=>{
    if(!areas[a]) areas[a]={v:0,t:0};
    areas[a].v+=h.v; areas[a].t+=h.t;
  }));
  return areas;
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// NAV
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='overview') renderOverview();
  else if(id==='risque')  renderSub('risque','base');
  else if(id==='bozzano') renderSub('bozzano','base');
  else if(id==='oetker')  renderDetail('oetker','base');
  else if(id==='suhai')   renderDetail('suhai','base');
}

function showSub(acct,sub,btn){
  document.querySelectorAll('#'+acct+'-subtabs .sub-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderSub(acct,sub);
}

function goToAcct(acct){
  const map={risque:1,bozzano:2,oetker:3,suhai:4};
  document.querySelectorAll('.nav-tab')[map[acct]].click();
}

// ══════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════
function renderOverview(){
  const grid=document.getElementById('ov-grid');
  let html='';
  Object.keys(LABELS).forEach(acct=>{
    const tot=totalHorasConta(acct);
    const p=pct(tot.v,tot.t);
    const color=COLORS[acct];
    const d=DATA[acct];
    const areas=horasPorAreaConta(acct);
    const aKeys=Object.keys(areas);
    const maxT=Math.max(...aKeys.map(a=>areas[a].t),1);

    let bars='';
    aKeys.forEach(area=>{
      const a=areas[area];
      const ap=pct(a.v,a.t);
      const hT=Math.max(Math.round((a.t/maxT)*48),3);
      const hV=a.v>0?Math.max(Math.round((a.v/maxT)*48),2):0;
      const lbl=area.substring(0,3).toUpperCase();
      bars+=`<div class="ov-bar-group">
        <div class="ov-bar-cols">
          <div class="ov-bar-col"><div class="ov-bar bar-scope" style="height:${hT}px" data-tip="Vendido: ${a.t}h"></div></div>
          <div class="ov-bar-col"><div class="ov-bar" style="height:0px;background:${sCol(ap)}" data-height="${hV}" data-tip="${area}: ${a.v}h/${a.t}h (${ap}%)"></div></div>
        </div>
        <div class="ov-bar-label">${lbl}</div>
      </div>`;
    });

    html+=`<div class="ov-card" onclick="goToAcct('${acct}')">
      <div class="ov-top">
        <div>
          <div class="ov-name" style="color:${color}">${LABELS[acct]}</div>
          <div class="ov-pct" style="color:${sCol(p)}">${p}<span class="ov-pct-lbl">% consumido</span></div>
          <div class="ov-hours">${tot.v}h consumidas · ${tot.t}h/mês vendidas</div>
          <span class="kpi-badge ${sCls(p)}">${sLbl(p)}</span>
        </div>
        <div class="ov-fee-box">
          <div class="ov-fee-label">Fee Mensal</div>
          <div class="ov-fee-value">${fmtR(d.feeMensal)}</div>
          <div class="ov-fee-sub">Fee total: ${fmtR(d.feeTotal)}</div>
          <div class="ov-fee-sub" style="margin-top:2px">${d.feePeriodo}</div>
        </div>
      </div>
      <hr class="ov-divider">
      <div class="ov-chart-title">Horas por área — consumido vs. vendido</div>
      <div class="ov-bars">${bars}</div>
      <div class="ov-legend">
        <div class="ov-leg-item"><div class="ov-leg-dot" style="background:var(--border)"></div>Vendido</div>
        <div class="ov-leg-item"><div class="ov-leg-dot" style="background:var(--green)"></div>&lt;70%</div>
        <div class="ov-leg-item"><div class="ov-leg-dot" style="background:var(--yellow)"></div>70–90%</div>
        <div class="ov-leg-item"><div class="ov-leg-dot" style="background:var(--red)"></div>+90%</div>
      </div>
    </div>`;
  });
  grid.innerHTML=html;
  animateBars();
}

// ══════════════════════════════════════════
// DETAIL
// ══════════════════════════════════════════
function renderDetail(acct,sub){ document.getElementById(acct+'-content').innerHTML=buildDetail(acct,sub); animateBars(); }
function renderSub(acct,sub){ document.getElementById(acct+'-content').innerHTML=buildDetail(acct,sub); animateBars(); }

function buildDetail(acct,sub){
  const d=DATA[acct];
  const sd=d.horas[sub];
  const horas=sd.horas;
  const budget=sd.budget;
  const aKeys=Object.keys(horas);
  const bKeys=Object.keys(budget);
  const color=COLORS[acct];

  let totV=0,totT=0;
  aKeys.forEach(a=>{totV+=horas[a].v;totT+=horas[a].t});
  const totP=pct(totV,totT);

  let budV=0,budT=0;
  bKeys.forEach(a=>{budV+=budget[a].v;budT+=budget[a].t});

  const subLbls={base:'',fiscal27:' · Fiscal 27',belga:' · Belga',desgel:' · Desgel Secante',expert:' · Expert'};
  const label=LABELS[acct]+(subLbls[sub]||'');

  // KPI
  const kpi=`<div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Horas Consumidas</div>
      <div class="kpi-value" style="color:${sCol(totP)}">${fmtH(totV)}</div>
      <div class="kpi-sub">de ${totT}h/mês vendidas</div>
      <span class="kpi-badge ${sCls(totP)}" style="margin-top:8px;display:inline-block">${sLbl(totP)}</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Horas Disponíveis</div>
      <div class="kpi-value">${fmtH(totT-totV)}</div>
      <div class="kpi-sub">restantes no escopo</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Fee Mensal</div>
      <div class="kpi-value" style="font-size:16px;color:var(--orange)">${fmtR(d.feeMensal)}</div>
      <div class="kpi-sub">${d.feePeriodo}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Fee Total Contrato</div>
      <div class="kpi-value" style="font-size:16px">${fmtR(d.feeTotal)}</div>
      <div class="kpi-sub">${totP}% escopo consumido</div>
    </div>
  </div>`;

  // Barras horas
  const maxH=Math.max(...aKeys.map(a=>horas[a].t),1);
  let horasBars='';
  aKeys.forEach(a=>{
    const ap=pct(horas[a].v,horas[a].t);
    const hT=Math.max(Math.round((horas[a].t/maxH)*115),3);
    const hV=horas[a].v>0?Math.max(Math.round((horas[a].v/maxH)*115),2):0;
    horasBars+=`<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar-col"><div class="bar bar-scope" style="height:${hT}px" data-tip="Vendido: ${horas[a].t}h"></div></div>
        <div class="bar-col"><div class="bar" style="height:0px;background:${sCol(ap)}" data-height="${hV}" data-tip="${horas[a].v}h consumidas (${ap}%)"></div></div>
      </div>
      <div class="bar-label">${a}</div>
      <div class="bar-pct" style="color:${sCol(ap)}">${ap}%</div>
    </div>`;
  });

  // Barras budget
  const maxB=Math.max(...bKeys.map(a=>budget[a].t),1);
  let budgetBars='';
  bKeys.forEach(a=>{
    const ap=pct(budget[a].v,budget[a].t);
    const hT=budget[a].t>0?Math.max(Math.round((budget[a].t/maxB)*115),3):28;
    const hV=budget[a].v>0?Math.max(Math.round((budget[a].v/maxB)*115),2):0;
    budgetBars+=`<div class="bar-group">
      <div class="bar-wrap">
        <div class="bar-col"><div class="bar bar-scope" style="height:${hT}px" data-tip="Contratado: ${budget[a].t>0?fmtR(budget[a].t):'—'}"></div></div>
        <div class="bar-col"><div class="bar" style="height:0px;background:${budget[a].v>0?sCol(ap):'var(--border)'}" data-height="${hV}" data-tip="${budget[a].v>0?fmtR(budget[a].v)+' ('+ap+'%)':'Sem dados'}"></div></div>
      </div>
      <div class="bar-label">${a}</div>
      <div class="bar-pct" style="color:${budget[a].t>0?sCol(ap):'var(--muted)'}">${budget[a].t>0?ap+'%':'—'}</div>
    </div>`;
  });

  // Tabela horas
  let rowsH='';
  aKeys.forEach(a=>{
    const ap=pct(horas[a].v,horas[a].t);
    rowsH+=`<tr>
      <td><span class="status-dot" style="background:${sCol(ap)}"></span>${a}</td>
      <td><input class="edit-input" type="number" min="0" value="${horas[a].v}" onchange="updateH('${acct}','${sub}','${a}','v',this.value)"/></td>
      <td style="color:var(--muted)">${horas[a].t}h <span style="font-size:9px">(fixo)</span></td>
      <td style="color:${sCol(ap)};font-weight:700">${ap}%</td>
      <td><span class="kpi-badge ${sCls(ap)}">${sLbl(ap)}</span></td>
    </tr>`;
  });

  // Tabela budget
  let rowsB='';
  bKeys.forEach(a=>{
    const ap=pct(budget[a].v,budget[a].t);
    rowsB+=`<tr>
      <td><span class="status-dot" style="background:${budget[a].t>0?sCol(ap):'var(--border)'}"></span>${a}</td>
      <td><input class="edit-input" type="number" min="0" value="${budget[a].v}" onchange="updateB('${acct}','${sub}','${a}','v',this.value)"/></td>
      <td><input class="edit-input" type="number" min="0" value="${budget[a].t}" onchange="updateB('${acct}','${sub}','${a}','t',this.value)"/></td>
      <td style="color:${budget[a].t>0?sCol(ap):'var(--muted)'};font-weight:700">${budget[a].t>0?ap+'%':'—'}</td>
      <td>${budget[a].t>0?`<span class="kpi-badge ${sCls(ap)}">${sLbl(ap)}</span>`:'<span style="color:var(--muted);font-size:10px">Inserir</span>'}</td>
    </tr>`;
  });

  return `
    <div class="acct-heading">
      <div class="acct-bar" style="background:${color}"></div>
      <div>
        <div style="font-size:18px;font-weight:800;letter-spacing:-.5px">${label}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Horas por área · sem dados de pessoa · consumido vs. vendido</div>
      </div>
    </div>
    ${kpi}
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Horas por Área — Consumido vs. Vendido</div>
        <div class="bar-chart">${horasBars}</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Vendido</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>&lt;70%</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>70–90%</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>+90%</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Budget por Categoria</div>
        <div class="bar-chart">${budgetBars}</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Contratado</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Consumido</div>
        </div>
      </div>
    </div>
    <div class="edit-wrap">
      <div class="edit-head">
        <span class="sec-title">✏ Horas consumidas por área</span>
        <span class="sec-hint">Horas vendidas são fixas do contrato · insira o consumido</span>
      </div>
      <table class="edit-table">
        <thead><tr><th>Área</th><th>Consumido (h)</th><th>Vendido (h)</th><th>%</th><th>Status</th></tr></thead>
        <tbody>${rowsH}</tbody>
      </table>
    </div>
    <div class="edit-wrap">
      <div class="edit-head">
        <span class="sec-title">✏ Budget por categoria</span>
        <span class="sec-hint">Valores em R$</span>
      </div>
      <table class="edit-table">
        <thead><tr><th>Categoria</th><th>Consumido (R$)</th><th>Contratado (R$)</th><th>%</th><th>Status</th></tr></thead>
        <tbody>${rowsB}</tbody>
      </table>
    </div>
    <div class="import-area" onclick="document.getElementById('csvInput').click()">
      <div style="font-size:20px;margin-bottom:6px">📂</div>
      <div class="import-text">Clique para <strong>importar CSV</strong> · horas consumidas por área</div>
      <div class="import-hint">Formato: Área, Consumido — as horas vendidas já estão no sistema</div>
    </div>`;
}

// ══════════════════════════════════════════
// UPDATE & REFRESH
// ══════════════════════════════════════════
function updateH(acct,sub,area,key,val){
  DATA[acct].horas[sub].horas[area][key]=parseFloat(val)||0;
  refreshCharts(acct,sub);
}
function updateB(acct,sub,area,key,val){
  DATA[acct].horas[sub].budget[area][key]=parseFloat(val)||0;
  refreshCharts(acct,sub);
}
function refreshCharts(acct,sub){
  const el=document.getElementById(acct+'-content');
  if(!el) return;
  const tmp=document.createElement('div');
  tmp.innerHTML=buildDetail(acct,sub);
  const newKpi=tmp.querySelector('.kpi-row');
  const oldKpi=el.querySelector('.kpi-row');
  if(newKpi&&oldKpi) oldKpi.replaceWith(newKpi);
  tmp.querySelectorAll('.chart-card').forEach((c,i)=>{
    const old=el.querySelectorAll('.chart-card')[i];
    if(old) old.replaceWith(c);
  });
  animateBars();
}

// ══════════════════════════════════════════
// ANIMATE
// ══════════════════════════════════════════
function animateBars(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('[data-height]').forEach(b=>{
      const h=b.getAttribute('data-height');
      setTimeout(()=>{b.style.height=h+'px'},60);
    });
  });
}

// ══════════════════════════════════════════
// CSV IMPORT
// ══════════════════════════════════════════
function importCSV(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split('\n');
    let imported=0;
    lines.slice(1).forEach(line=>{
      const cols=line.split(',').map(c=>c.trim());
      if(cols.length>=2){
        const activeTab=document.querySelector('.nav-tab.active');
        const txt=activeTab?activeTab.textContent.toLowerCase():'';
        const acct=txt.includes('risq')?'risque':txt.includes('bozz')?'bozzano':txt.includes('oet')?'oetker':'suhai';
        const area=cols[0], v=parseFloat(cols[1]);
        if(DATA[acct]&&DATA[acct].horas.base.horas[area]!==undefined){
          DATA[acct].horas.base.horas[area].v=v; imported++;
        }
      }
    });
    showToast('✓ '+imported+' registros importados');
    document.querySelector('.nav-tab.active').click();
    event.target.value='';
  };
  reader.readAsText(file,'UTF-8');
}

// ══════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════
function saveAll(){
  try{ localStorage.setItem('n3_v3',JSON.stringify(DATA)); showToast('✓ Salvo com sucesso'); }
  catch(e){ showToast('⚠ Erro ao salvar'); }
}
function loadSaved(){
  try{
    const s=localStorage.getItem('n3_v3');
    if(!s) return;
    const p=JSON.parse(s);
    Object.keys(p).forEach(acct=>{
      if(!DATA[acct]) return;
      if(p[acct].horas) Object.keys(p[acct].horas).forEach(sub=>{
        if(DATA[acct].horas[sub]) DATA[acct].horas[sub]=p[acct].horas[sub];
      });
    });
  }catch(e){}
}

loadSaved();
renderOverview();
</script>
